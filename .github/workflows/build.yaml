name: BuildQwenInspector

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - run: |
          set -ex
          mkdir -p Payload/QwenInspector.app
          cat > app.swift <<'SWIFT'
          import UIKit
          import WebKit

          class VC: UIViewController, WKScriptMessageHandler {
              var wv: WKWebView!
              var lastColor = "255,255,255"
              var stableCount = 0
              var sb = false

              override var preferredStatusBarStyle: UIStatusBarStyle {
                  return sb ? .lightContent : .darkContent
              }

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.white
                  sb = false
                  
                  let c = WKWebViewConfiguration()
                  c.userContentController.add(self, name: "themeHandler")
                  
                  let themeJS = """
                  (function(){
                    var last='';
                    var stable=0;
                    function getTopColor(){
                      var selectors=['header','nav','[class*=header]','[class*=nav]','[class*=top]','[id*=header]','[id*=nav]','.app-header','.navbar','.top-bar','#header'];
                      for(var i=0;i<selectors.length;i++){
                        var el=document.querySelector(selectors[i]);
                        if(el){
                          var rect=el.getBoundingClientRect();
                          if(rect.top<=5 && rect.height>20){
                            var c=getComputedStyle(el).backgroundColor;
                            var m=c.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                            if(m && c!=='rgba(0, 0, 0, 0)' && c!=='transparent') return m[1]+','+m[2]+','+m[3];
                          }
                        }
                      }
                      var candidates=document.querySelectorAll('body > *');
                      for(var i=0;i<candidates.length;i++){
                        var r=candidates[i].getBoundingClientRect();
                        if(r.top<=5 && r.height>30){
                          var c=getComputedStyle(candidates[i]).backgroundColor;
                          var m=c.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                          if(m && c!=='rgba(0, 0, 0, 0)' && c!=='transparent') return m[1]+','+m[2]+','+m[3];
                        }
                      }
                      var el=document.body;
                      while(el && el!==document.documentElement){
                        var c=getComputedStyle(el).backgroundColor;
                        var m=c.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                        if(m && c!=='rgba(0, 0, 0, 0)' && c!=='transparent') return m[1]+','+m[2]+','+m[3];
                        el=el.parentElement;
                      }
                      var c=getComputedStyle(document.documentElement).backgroundColor;
                      var m=c.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                      if(m) return m[1]+','+m[2]+','+m[3];
                      return '255,255,255';
                    }
                    function send(){
                      var color=getTopColor();
                      if(color===last){stable++;}else{stable=0;last=color;}
                      if(stable>=1){
                        if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.themeHandler){
                          window.webkit.messageHandlers.themeHandler.postMessage(color);
                        }
                      }
                    }
                    if(document.readyState==='loading'){
                      document.addEventListener('DOMContentLoaded',send);
                    }else{
                      send();
                    }
                    setInterval(send,400);
                    var observer=new MutationObserver(function(){stable=0;send();});
                    observer.observe(document.documentElement,{attributes:true,childList:true,subtree:true});
                  })()
                  """
                  
                  c.userContentController.addUserScript(WKUserScript(source: themeJS, injectionTime: .atDocumentStart, forMainFrameOnly: false))
                  
                  wv = WKWebView(frame: .zero, configuration: c)
                  wv.translatesAutoresizingMaskIntoConstraints = false
                  wv.customUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
                  view.addSubview(wv)
                  NSLayoutConstraint.activate([
                      wv.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      wv.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      wv.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      wv.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
                  wv.load(URLRequest(url: URL(string: "https://chat.qwen.ai/")!))
                  
                  // Bigger, red, very visible button
                  let btn = UIButton(type: .system)
                  btn.setTitle("INSPECT", for: .normal)
                  btn.backgroundColor = UIColor.red
                  btn.setTitleColor(UIColor.white, for: .normal)
                  btn.titleLabel?.font = UIFont.boldSystemFont(ofSize: 16)
                  btn.layer.cornerRadius = 8
                  btn.layer.shadowColor = UIColor.black.cgColor
                  btn.layer.shadowOffset = CGSize(width: 0, height: 2)
                  btn.layer.shadowOpacity = 0.5
                  btn.layer.shadowRadius = 4
                  btn.translatesAutoresizingMaskIntoConstraints = false
                  btn.addTarget(self, action: #selector(inspectTapped), for: .touchUpInside)
                  view.addSubview(btn)
                  
                  // Bring to absolute front
                  view.bringSubviewToFront(btn)
                  
                  NSLayoutConstraint.activate([
                      btn.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor, constant: 6),
                      btn.trailingAnchor.constraint(equalTo: view.trailingAnchor, constant: -6),
                      btn.widthAnchor.constraint(equalToConstant: 100),
                      btn.heightAnchor.constraint(equalToConstant: 44)
                  ])
              }

              @objc func inspectTapped() {
                  let js = """
                  (function(){
                    var results=[];
                    var all=document.querySelectorAll('body *');
                    for(var i=0;i<<all.length;i++){
                      var el=all[i];
                      var rect=el.getBoundingClientRect();
                      if(rect.width>50 && rect.height>20 && rect.top<<250){
                        var id=el.id||'';
                        var cls=el.className||'';
                        var text=(el.textContent||'').substring(0,60).replace(/\\s+/g,' ');
                        var tag=el.tagName.toLowerCase();
                        var sel=id?('#'+id):(cls?('.'+cls.split(/\\s+/)[0]):tag);
                        if(id||cls){
                          results.push({tag:tag,id:id,class:cls,text:text,selector:sel});
                        }
                      }
                    }
                    return JSON.stringify(results.slice(0,30));
                  })()
                  """
                  wv.evaluateJavaScript(js) { [weak self] result, error in
                      guard let self = self else { return }
                      if let err = error {
                          self.showAlert(title: "Error", message: err.localizedDescription)
                          return
                      }
                      if let json = result as? String,
                         let data = json.data(using: .utf8),
                         let arr = try? JSONSerialization.jsonObject(with: data) as? [[String:String]] {
                          self.showElementPicker(elements: arr)
                      } else {
                          self.showAlert(title: "No Elements", message: "No elements found near top of page.")
                      }
                  }
              }

              func showElementPicker(elements: [[String:String]]) {
                  let alert = UIAlertController(title: "Tap to Copy Selector", message: nil, preferredStyle: .actionSheet)
                  for el in elements {
                      let tag = el["tag"] ?? "?"
                      let id = el["id"] ?? ""
                      let cls = el["class"] ?? ""
                      let text = el["text"] ?? ""
                      let sel = el["selector"] ?? ""
                      let title = "[\(tag)] \(sel) - \(text)"
                      let action = UIAlertAction(title: title, style: .default) { _ in
                          UIPasteboard.general.string = sel
                          self.showAlert(title: "Copied!", message: "Selector copied:\n\(sel)")
                      }
                      alert.addAction(action)
                  }
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel))
                  self.present(alert, animated: true)
              }

              func showAlert(title: String, message: String) {
                  let alert = UIAlertController(title: title, message: message, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default))
                  self.present(alert, animated: true)
              }

              func userContentController(_ u: WKUserContentController, didReceive m: WKScriptMessage) {
                  if m.name == "themeHandler" {
                      if let r = m.body as? String {
                          if r == lastColor {
                              stableCount += 1
                          } else {
                              stableCount = 0
                              lastColor = r
                          }
                          if stableCount >= 1 {
                              let p = r.split(separator: ",").compactMap { Int($0.trimmingCharacters(in: CharacterSet.whitespaces)) }
                              if p.count == 3 {
                                  let R = CGFloat(p[0]) / 255.0
                                  let G = CGFloat(p[1]) / 255.0
                                  let B = CGFloat(p[2]) / 255.0
                                  view.backgroundColor = UIColor(red: R, green: G, blue: B, alpha: 1.0)
                                  let l = (0.299 * CGFloat(p[0]) + 0.587 * CGFloat(p[1]) + 0.114 * CGFloat(p[2])) / 255.0
                                  let newDark: Bool
                                  if l < 0.45 { newDark = true }
                                  else if l > 0.55 { newDark = false }
                                  else { newDark = sb }
                                  if newDark != sb {
                                      sb = newDark
                                      setNeedsStatusBarAppearanceUpdate()
                                  }
                              }
                          }
                      }
                  }
              }
          }

          class AD: UIResponder, UIApplicationDelegate {
              var w: UIWindow?
              func application(_ a: UIApplication, didFinishLaunchingWithOptions l: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  w = UIWindow(frame: UIScreen.main.bounds)
                  w?.rootViewController = VC()
                  w?.makeKeyAndVisible()
                  return true
              }
          }

          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AD.self))
          SWIFT
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -framework UIKit -framework WebKit -o Payload/QwenInspector.app/QwenInspector app.swift
          chmod +x Payload/QwenInspector.app/QwenInspector
          cat > Payload/QwenInspector.app/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>QwenInspector</string>
          <key>CFBundleIdentifier</key><string>com.qwen.inspector</string>
          <key>CFBundleName</key><string>Qwen Inspector</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>MinimumOSVersion</key><string>15.0</string>
          <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
          <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>
          <key>UIViewControllerBasedStatusBarAppearance</key><true/>
          <key>CFBundleIcons</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconFiles</key><array><string>AppIcon60x60</string></array><key>CFBundleIconName</key><string>AppIcon</string></dict></dict>
          </dict></plist>
          PLIST
          printf 'APPL????' > Payload/QwenInspector.app/PkgInfo
          zip -r QwenInspector.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: QwenInspector-IPA
          path: QwenInspector.ipa
